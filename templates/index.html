<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>XrayPulse Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400">XrayPulse <span class="text-gray-500 text-sm font-normal">v1.1</span></h1>
            <button onclick="refreshData()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm transition">Обновить логи</button>
        </header>

        <div class="flex items-center space-x-4">
            <div id="status-indicator" class="flex items-center text-xs text-green-400">
                <span class="relative flex h-2 w-2 mr-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                Система онлайн
            </div>
            
            <select id="refreshInterval" class="bg-gray-800 text-xs border border-gray-700 rounded px-2 py-1 text-gray-300">
                <option value="0">Ручное обновление</option>
                <option value="5000">5 сек</option>
                <option value="30000" selected>30 сек</option>
                <option value="60000">1 мин</option>
                <option value="300000">5 мин</option>
            </select>
            
            <button onclick="loadData()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm transition">
                Обновить сейчас
            </button>
        </div>

        <div id="error-alert" class="hidden mx-auto max-w-4xl mt-4 p-4 bg-red-900/50 border border-red-500 text-red-200 rounded">
            <strong>Ошибка сервера:</strong> <span id="error-text"></span>
        </div>        
        <div class="grid grid-cols-1 gap-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                <canvas id="mainChart" height="100"></canvas>
            </div>

            <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-xl">
                <table class="w-full text-left">
                    <thead class="text-xs text-gray-400 uppercase bg-gray-800">
                        <tr>
                            <th class="px-4 py-3">Время</th>
                            <th class="px-4 py-3">Источник (Source)</th>
                            <th class="px-4 py-3">Цель (Target)</th>
                            <th class="px-4 py-3">Ошибка</th>
                            <th class="px-4 py-3">Описание</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
