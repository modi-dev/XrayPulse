<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>XrayPulse Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400">XrayPulse <span class="text-gray-500 text-sm font-normal">v1.1</span></h1>
            <button onclick="refreshData()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm transition">Обновить логи</button>
        </header>

        <div class="grid grid-cols-1 gap-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                <canvas id="mainChart" height="100"></canvas>
            </div>

            <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-xl">
                <table class="w-full text-left">
                    <thead class="text-xs text-gray-400 uppercase bg-gray-800">
                        <tr>
                            <th class="px-4 py-3">Время</th>
                            <th class="px-4 py-3">Источник (Source)</th>
                            <th class="px-4 py-3">Цель (Target)</th>
                            <th class="px-4 py-3">Ошибка</th>
                            <th class="px-4 py-3">Описание</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let myChart;

        async function refreshData() {
            await fetch('/api/update'); // Сначала просим сервер спарсить логи в БД
            loadDashboard();
        }

        async function loadDashboard() {
            const response = await fetch('/api/history');
            const data = await response.json();

            // Обновляем таблицу
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(item => `
                <tr class="hover:bg-gray-750 transition">
                    <td class="px-6 py-4 font-mono text-xs text-red-400">${item.type}</td>
                    <td class="px-6 py-4 text-sm text-gray-300">${item.desc}</td>
                    <td class="px-6 py-4 text-right font-bold">${item.count}</td>
                </tr>
            `).join('');

            // Обновляем график
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(i => i.type.substring(0, 20) + '...'),
                    datasets: [{
                        label: 'Количество срабатываний за всё время',
                        data: data.map(i => i.count),
                        backgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true, grid: { color: '#374151' } } }
                }
            });
        }
        async function loadRecent() {
            const response = await fetch('/api/recent');
            const data = await response.json();

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(item => `
                <tr class="border-b border-gray-700 hover:bg-gray-750">
                    <td class="px-4 py-2 text-xs text-blue-300">${item.timestamp}</td>
                    <td class="px-4 py-2 text-xs text-green-400">${item.source}</td>
                    <td class="px-4 py-2 text-xs text-yellow-300 font-mono">${item.destination}</td>
                    <td class="px-4 py-2 text-xs text-red-400 font-mono">${item.error_type}</td>
                    <td class="px-4 py-2 text-sm text-gray-300">${item.description}</td>
                </tr>
            `).join('');
        }
        loadDashboard();
    </script>
</body>
</html>
